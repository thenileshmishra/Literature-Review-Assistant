version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: litrev-postgres
    environment:
      POSTGRES_DB: litrev
      POSTGRES_USER: litrev_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdevpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litrev_admin -d litrev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - litrev-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: litrev-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o-mini}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
      - MAX_PAPERS=${MAX_PAPERS:-10}
      - DEFAULT_PAPERS=${DEFAULT_PAPERS:-5}
      - API_PORT=8000
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - DATABASE_URL=postgresql+asyncpg://litrev_admin:${DB_PASSWORD:-localdevpassword}@postgres:5432/litrev
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-jwt-key-change-in-production-32chars}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - litrev-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: litrev-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - litrev-network

volumes:
  pgdata:

networks:
  litrev-network:
    driver: bridge
